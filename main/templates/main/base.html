{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byte. | Innovative Journal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top custom-nav">
    <div class="container">
        <a class="navbar-brand fw-bolder fs-3" href="{% url 'main:home_view' %}">
            Byte<span class="dot-accent">.</span>
        </a>
        <div class="ms-auto d-flex gap-4 align-items-center">
            <a href="{% url 'main:home_view' %}" class="nav-link-premium">Journal</a>
            <a href="{% url 'blog:add_post_view' %}" class="btn-action">
                <span>Write Story</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </a>
        </div>
    </div>
</nav>

<main class="container my-5 py-5">
    {% block content %} {% endblock %}
</main>
<footer class="footer-premium mt-auto">
    <div class="container">
        <div class="row align-items-center py-5 border-top">
            <div class="col-md-6 text-center text-md-start">
                <a class="navbar-brand fw-bold fs-4" href="#">Byte<span class="dot-accent">.</span></a>
                <p class="text-muted small mt-2">Capturing thoughts, one byte at a time.</p>
            </div>
            <div class="col-md-6 text-center text-md-end mt-4 mt-md-0">
                <div class="footer-links d-flex justify-content-center justify-content-md-end gap-4 mb-3">
                    <a href="#" class="footer-link">About</a>
                    <a href="#" class="footer-link">Archive</a>
                    <a href="#" class="footer-link">Privacy</a>
                </div>
                <p class="text-muted extra-small">© 2026 Byte Notes. Crafted with passion by Atheer.</p>
            </div>
        </div>
    </div>
</footer>
<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
