{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byte. | Innovative Journal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top custom-nav">
    <div class="container">
        <a class="navbar-brand fw-bolder fs-3" href="{% url 'main:home_view' %}" style="color: var(--text-color);">
            Byte<span class="dot-accent" style="color: var(--accent);">.</span>
        </a>
        
        <div class="ms-auto d-flex gap-4 align-items-center">
            <a href="{% url 'main:home_view' %}" class="nav-link-premium" style="color: var(--text-color);">Journal</a>
            
            <button id="theme-toggle" class="btn btn-sm btn-outline-secondary rounded-circle px-2">
                <i id="theme-icon" class="bi bi-moon-stars-fill"></i>
            </button>
        </div>
    </div>
</nav>

<main class="container my-5 py-5">
    {% block content %} 
    {% endblock %}
</main>

<footer class="footer-premium mt-auto" style="border-top: 1px solid var(--border-color); padding-top: 2rem;">
    <div class="container">
        <div class="row align-items-center py-5"> <div class="col-md-6 text-center text-md-start">
                <a class="navbar-brand fw-bold fs-4" href="#" style="color: var(--text-color);">
                    Byte<span class="dot-accent" style="color: var(--accent);">.</span>
                </a>
                <p class="small mt-2" style="color: var(--text-color); opacity: 0.7;">
                    Capturing thoughts, one byte at a time.
                </p>
            </div>
            
            <div class="col-md-6 text-center text-md-end mt-4 mt-md-0">
                <div class="footer-links d-flex justify-content-center justify-content-md-end gap-4 mb-3">
                    <a href="#" class="footer-link" style="color: var(--text-color);">About</a>
                    <a href="#" class="footer-link" style="color: var(--text-color);">Archive</a>
                    <a href="#" class="footer-link" style="color: var(--text-color);">Privacy</a>
                </div>
                <p class="extra-small" style="color: var(--text-color); opacity: 0.5;">
                    © 2026 Byte Notes. All rights reserved.
                </p>
            </div>
        </div>
    </div>
</footer>

<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
