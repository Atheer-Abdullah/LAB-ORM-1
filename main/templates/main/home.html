{% extends 'main/base.html' %}

{% block content %}
<header class="mb-5 py-4 text-center">
    <h1 class="merged-section-title" style="color: var(--text-color);">
        <span class="text-latest">Latest</span> 
        <span class="text-stories" style="opacity: 0.8;">Stories</span><span class="dot-accent" style="color: var(--accent);">.</span>
    </h1>
</header>

<div class="row">
    <div class="col-md-8 offset-md-2">
        {% for post in posts %}
        <article class="post-card mb-5 p-4" style="background-color: var(--card-bg); border-radius: 20px; border: 1px solid var(--border-color); transition: transform 0.3s ease;">
            <h2 class="fw-bold mb-3 h3" style="color: var(--text-color);">{{ post.title }}</h2>
            
            <p class="post-content mb-4" style="color: var(--text-color); opacity: 0.8; line-height: 1.7;">
                {{ post.content|truncatewords:40 }}
            </p>

            <div class="pt-3 border-top mt-3" style="border-top-color: var(--border-color) !important;">
                <div class="small d-flex align-items-center gap-3" style="color: var(--text-color); opacity: 0.6;">
                    
                    <div class="d-flex align-items-center gap-1">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        <span>{{ post.published_at|date:"M d, Y" }}</span>
                    </div>

                    <span class="opacity-50">|</span>

                    <div class="d-flex align-items-center gap-1">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        <span>{{ post.published_at|date:"H:i" }}</span>
                    </div>
                </div>
            </div>
        </article>
        
        {% empty %}
        <div class="text-center py-5">
            <i class="bi bi-journal-x fs-1 mb-3" style="color: var(--accent); opacity: 0.5;"></i>
            <p class="fs-4" style="color: var(--text-color); opacity: 0.6;">Your journal is currently empty.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
