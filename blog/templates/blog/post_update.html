{% extends 'main/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="editor-container">
            <div class="editor-header mb-5">
                <h1 class="display-5 fw-bold">Edit <span class="text-accent">Chapter.</span></h1>
                <p class="text-muted">Refine your masterpiece and update your thoughts for the world.</p>
            </div>
            
            <form action="{% url 'blog:post_update_view' post.id %}" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="form-group-premium">
                    <input type="text" name="title" class="title-input" placeholder="Title of your story..." value="{{ post.title }}" required>
                </div>

                <div class="form-group-premium">
                    <textarea name="content" class="content-input" placeholder="Start writing your masterpiece..." required>{{ post.content }}</textarea>
                </div>

                <div class="form-footer mt-5 d-flex justify-content-between align-items-center flex-wrap gap-3">
                    
                    <div class="d-flex gap-2">
                        <label for="id_poster" class="btn-action shadow-sm {% if post.poster %}btn-success-custom{% endif %}" style="cursor: pointer; padding: 8px 15px; font-size: 0.9rem;">
                            <i class="bi {% if post.poster %}bi-check-circle-fill{% else %}bi-image{% endif %} me-1"></i> 
                            {% if post.poster %}Image Selected{% else %}Image{% endif %}
                        </label>
                        <input type="file" name="poster" id="id_poster" accept="image/*" style="display: none;">
                        
                        <label for="id_video" class="btn-action shadow-sm {% if post.video %}btn-success-custom{% endif %}" style="cursor: pointer; padding: 8px 15px; font-size: 0.9rem;">
                            <i class="bi {% if post.video %}bi-play-btn{% else %}bi-play-btn{% endif %} me-1"></i> Video
                        </label>
                        <input type="file" name="video" id="id_video" accept="video/*" style="display: none;">
                        
                        <label for="id_media" class="btn-action shadow-sm {% if post.media %}btn-success-custom{% endif %}" style="cursor: pointer; padding: 8px 15px; font-size: 0.9rem;">
                            <i class="bi bi-file-earmark-pdf me-1"></i> PDF
                        </label>
                        <input type="file" name="media" id="id_media" accept=".pdf" style="display: none;">
                    </div>

                    <div class="d-flex gap-2">
                         <a href="{% url 'blog:post_detail_view' post.id %}" class="btn-action shadow-sm" style="text-decoration: none; background: #6c757d;">Cancel</a>
                         <button type="submit" class="btn-action shadow-lg">Save Changes</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    
    document.querySelectorAll('input[type="file"]').forEach(input => {
        input.addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                const label = document.querySelector(`label[for="${this.id}"]`);
                const fileName = this.files[0].name;
                
                label.style.background = "#28a745"; 
                label.style.color = "white";
                label.style.borderColor = "#28a745";
                label.innerHTML = `<i class="bi bi-check-circle-fill"></i> ${fileName.substring(0, 10)}...`;
            }
        });
    });
</script>
{% endblock %}
